<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>劇場公演 割り当てツール</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>劇場公演 割り当てツール</h1>
  </header>

  <!-- メニュー -->
  <button id="menu-btn">📋 ポジション一覧</button>

  <!-- チーム選択 -->
  <label for="team-select">チーム</label>
  <select id="team-select">
    <option value="teamA">チームA</option>
    <option value="teamB">チームB</option>
  </select>

  <!-- 日付 -->
  <label for="date">日付</label>
  <input type="date" id="date" />

  <!-- メンバー -->
  <label>休演メンバー</label>
  <div id="members"></div>

  <!-- 実行 -->
  <button id="assign-btn">割り当て開始</button>

  <!-- 表 -->
  <section id="result"></section>

  <!-- JSON -->
  <label>JSON</label>
  <textarea id="json-output" readonly></textarea>

  <!-- JS（ここが重要） -->
  <script type="module" src="./main.js"></script>
</body>
</html>
