<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>劇場公演 割り当てツール</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ======================
ヘッダー（固定）
====================== -->
<header class="header">
  <button id="menu-btn" class="menu-btn">☰</button>
  <h1>劇場公演 割り当てツール</h1>
</header>

<!-- ======================
サイドメニュー（履歴）
====================== -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h3>チームA 公演履歴</h3>
  </div>

  <!-- 横比較UIがここに出る -->
  <div id="list-view"></div>
</aside>

<!-- 背景オーバーレイ -->
<div id="overlay"></div>

<!-- ======================
上部コントロール
====================== -->
<div class="controls">

  <label class="control-item">
    チーム
    <select id="team-select">
      <option value="teamA">チームA</option>
      <option value="teamB">チームB</option>
    </select>
  </label>

  <label class="control-item">
    日付
    <input type="date" id="date" />
  </label>

</div>

<!-- ======================
休演チェック
====================== -->
<div class="section">
  <h3>休演メンバー</h3>
  <div id="members" class="members"></div>
</div>

<!-- ======================
実行
====================== -->
<button id="assign-btn" class="main-btn">割り当て</button>

<!-- ======================
結果
====================== -->
<div id="result" class="result"></div>

<!-- JSON出力 -->
<pre id="json-output" class="json-output"></pre>

<script type="module" src="./main.js"></script>

</body>
</html>
