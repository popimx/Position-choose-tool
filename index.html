<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>劇場公演 割り当てツール</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="header">
  <button id="menu-btn">☰</button>
  <h1>劇場公演 割り当てツール</h1>
</header>

<!-- サイドメニュー -->
<aside id="sidebar" class="sidebar">
  <h3>ポジション一覧</h3>
  <div id="list-view"></div>
</aside>

<!-- オーバーレイ -->
<div id="overlay"></div>

<!-- 上部コントロール -->
<div class="controls">

  <label>
    チーム
    <select id="team-select">
      <option value="teamA">チームA</option>
      <option value="teamB">チームB</option>
    </select>
  </label>

  <label>
    日付
    <input type="date" id="date" />
  </label>

</div>

<!-- メンバー -->
<div class="section">
  <h3>休演メンバー</h3>
  <div id="members"></div>
</div>

<button id="assign-btn">割り当て</button>

<div id="result"></div>

<pre id="json-output"></pre>

<script type="module" src="./main.js"></script>
</body>
</html>
